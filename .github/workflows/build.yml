name: Build

on:
  pull_request:
    branches: ['**']
  push:
    branches: [ "main" ]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write
  pull-requests: write

jobs:
  # =================================================================
  # Job 1: Run Checks (Type Check and Lint)
  # =================================================================
  check:
    name: 🧪 Checks
    runs-on: ubuntu-latest
    env:
      SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 25
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run type-check
        run: npm run type-check

      - name: Run lint
        run: npm run lint

      - name: SonarCloud Scan
        if: env.SONAR_TOKEN != ''
        uses: SonarSource/sonarqube-scan-action@59db25f34e16620e48ab4bb9e4a5dce155cb5432 # v8.0.0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

  # =================================================================
  # Job 2: Build Production Artifact (for GitHub Releases)
  # This job's sole purpose is to create the .zip file for the release.
  # =================================================================
  build_artifact:
    name: 🏗️ Build Release Artifact
    runs-on: ubuntu-latest
    needs: check
    if: github.ref == 'refs/heads/main'
    outputs:
      version: ${{ steps.build_info.outputs.version }}
      timestamp: ${{ steps.build_info.outputs.timestamp }}
      artifact-name: ${{ steps.build_info.outputs.artifact-name }}
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 25
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build production application
        run: npm run build

      - name: Prepare build information
        id: build_info
        run: |
          VERSION=$(node -p "require('./package.json').version")
          TIMESTAMP=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          ARTIFACT_NAME="porturl-web-v${VERSION}.zip"
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "timestamp=$TIMESTAMP" >> $GITHUB_OUTPUT
          echo "artifact-name=$ARTIFACT_NAME" >> $GITHUB_OUTPUT

      - name: Archive production build
        run: |
          cd dist
          zip -r ../${{ steps.build_info.outputs.artifact-name }} .

      - name: Upload build artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: build-artifact
          path: ${{ steps.build_info.outputs.artifact-name }}
          retention-days: 7

  # =================================================================
  # Job 3: Build and Push Docker Image (from source)
  # This job builds the Docker image from source, ensuring local builds work.
  # =================================================================
  docker:
    name: 🐳 Build and Push Docker Image
    runs-on: ubuntu-latest
    needs: check
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Set up QEMU & Docker Buildx
        uses: docker/setup-qemu-action@ce360397dd3f832beb865e1373c09c0e9f86d70a # v4
      - uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4

      - name: Login to Docker Hub
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Prepare Docker tags
        id: docker_tags
        run: |
          IMAGE_NAME="friesoft/porturl-web"
          TAGS="$IMAGE_NAME:snapshot,$IMAGE_NAME:main-${{ github.sha }}"
          echo "tags=$TAGS" >> $GITHUB_OUTPUT

      - name: Build and push Docker image
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f # v7
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.docker_tags.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          labels: |
            org.opencontainers.image.title=porturl-web
            org.opencontainers.image.version=${{ needs.build_artifact.outputs.version }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.created=${{ needs.build_artifact.outputs.timestamp }}

  # =================================================================
  # Job 4: Create a GitHub Snapshot Release
  # =================================================================
  release-snapshot:
    name: 🚀 Create Snapshot Release
    runs-on: ubuntu-latest
    needs: [build_artifact, docker]
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Download build artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: build-artifact
          path: .

      - name: Create source code zip
        run: zip -r porturl-web-src.zip . -x ".git/*" "node_modules/*" "dist/*" "coverage/*"

      - name: Remove old snapshot prerelease
        run: |
          if gh release view snapshot --repo $GITHUB_REPOSITORY >/dev/null 2>&1; then
            gh release delete snapshot --cleanup-tag --yes --repo $GITHUB_REPOSITORY
          fi
        env:
          GH_TOKEN: "${{ secrets.GITHUB_TOKEN }}"
          GITHUB_REPOSITORY: "${{ github.repository }}"

      - name: Create snapshot prerelease
        uses: ncipollo/release-action@339a81892b84b4eeb0f6e744e4574d79d0d9b8dd # v1
        with:
          token: "${{ secrets.GITHUB_TOKEN }}"
          tag: "snapshot"
          prerelease: true
          name: "Development Build (Snapshot)"
          body: |
            ## 🚧 Development Build from main branch

            **Commit:** `${{ github.sha }}`
            **Version:** `${{ needs.build_artifact.outputs.version }}`
            **Built:** `${{ needs.build_artifact.outputs.timestamp }}`

            ### 📦 Available Downloads
            - **Build Artifact:** `${{ needs.build_artifact.outputs.artifact-name }}`
            - **Source Code:** `porturl-web-src.zip`

            ### 🐳 Docker Images
            ```bash
            # Pull the latest snapshot image
            docker pull friesoft/porturl-web:snapshot

            # Pull the commit-specific image
            docker pull friesoft/porturl-web:main-${{ github.sha }}
            ```
          artifacts: "${{ needs.build_artifact.outputs.artifact-name }},porturl-web-src.zip"
          allowUpdates: true
